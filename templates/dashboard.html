            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('user-modal')">取消</button>
                <button class="btn-primary" onclick="addUser()">添加</button>
            </div>
        </div>
    </div>

    <!-- Password Modal -->
    <div class="modal-backdrop" id="password-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>修改密码</h3>
                <button class="modal-close" onclick="closeModal('password-modal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>旧密码</label>
                    <input type="password" id="old-password">
                </div>
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" id="new-password">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('password-modal')">取消</button>
                <button class="btn-primary" onclick="changePassword()">确认修改</button>
            </div>
        </div>
    </div>

    <!-- Export Modal -->
    <div class="modal-backdrop" id="export-modal">
        <div class="modal" style="width:440px">
            <div class="modal-header">
                <h3>导出数据</h3>
                <button class="modal-close" onclick="closeModal('export-modal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>开始日期</label>
                        <input type="date" id="export-start">
                    </div>
                    <div class="form-group">
                        <label>结束日期</label>
                        <input type="date" id="export-end">
                    </div>
                </div>
                <div class="form-group">
                    <label>快捷选择</label>
                    <div style="display:flex;gap:8px;flex-wrap:wrap">
                        <button class="filter-chip" onclick="setExportRange('today')">今天</button>
                        <button class="filter-chip" onclick="setExportRange('week')">本周</button>
                        <button class="filter-chip" onclick="setExportRange('month')">本月</button>
                        <button class="filter-chip" onclick="setExportRange('last-month')">上月</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('export-modal')">取消</button>
                <button class="btn-primary" onclick="doExport()">下载 CSV</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
    // ─── State ─────────────────────────────────────────────────
    // Auto-detect base path (supports /taskflow or root /)
    const BASE = window.location.pathname.replace(/\/dashboard\/?$/, '') || '';
    let currentUser = null;
    let users = [];
    let currentDate = new Date().toISOString().split('T')[0];
    let currentView = 'overview';
    let statusFilter = '';

    // ─── Init ──────────────────────────────────────────────────
    async function init() {
        const res = await fetch(BASE + '/api/me');
        if (!res.ok) { window.location.href = BASE + '/login'; return; }
        currentUser = await res.json();

        document.getElementById('my-name').textContent = currentUser.display_name;
        const av = document.getElementById('my-avatar');
        av.style.background = currentUser.avatar_color;
        av.textContent = currentUser.display_name[0];

        // All users can add tasks (employees only for themselves)
        let taskActionsHtml = `
            <button class="add-task-btn" onclick="showAddTask()" style="margin:0">
                <span style="font-size:18px">+</span> 添加任务
            </button>
        `;
        if (currentUser.role === 'admin') {
            document.getElementById('settings-tab').style.display = '';
            taskActionsHtml += `
                <button class="add-task-btn" onclick="copyToTomorrow()" style="margin:0;max-width:220px"
                        title="将今天未完成的任务复制到明天">
                    <span style="font-size:16px">→</span> 未完成顺延明天
                </button>
            `;
        }
        document.getElementById('admin-task-actions').innerHTML = taskActionsHtml;

        await loadUsers();
        updateDateLabel();
        loadOverview();
        loadNotifications();
    }

    // ─── API Helper ────────────────────────────────────────────
    async function api(url, opts = {}) {
        url = BASE + url;
        if (opts.body && typeof opts.body === 'object') {
            opts.headers = {'Content-Type': 'application/json'};
            opts.body = JSON.stringify(opts.body);
        }
        const res = await fetch(url, opts);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '请求失败');
        return data;
    }

    // ─── Users ─────────────────────────────────────────────────
    async function loadUsers() {
        users = await api('/api/users');
        // Populate filter dropdown
        const sel = document.getElementById('filter-user');
        sel.innerHTML = '<option value="">全部成员</option>';
        users.forEach(u => {
            sel.innerHTML += `<option value="${u.id}">${u.display_name}</option>`;
        });
        // Populate assign dropdown
        const assign = document.getElementById('task-assigned');
        assign.innerHTML = '';
        users.forEach(u => {
            assign.innerHTML += `<option value="${u.id}">${u.display_name}</option>`;
        });
    }

    let reportDate = new Date().toISOString().split('T')[0];

    // ─── Views ─────────────────────────────────────────────────
    function switchView(view) {
        currentView = view;
        document.querySelectorAll('.header-nav button').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('view-overview').style.display = view === 'overview' ? '' : 'none';
        document.getElementById('view-tasks').style.display = view === 'tasks' ? '' : 'none';
        document.getElementById('view-calendar').style.display = view === 'calendar' ? '' : 'none';
        document.getElementById('view-report').style.display = view === 'report' ? '' : 'none';
        document.getElementById('view-settings').style.display = view === 'settings' ? '' : 'none';
        document.getElementById('view-methodology').style.display = view === 'methodology' ? '' : 'none';

        if (view === 'overview') loadOverview();
        if (view === 'tasks') loadTasks();
        if (view === 'calendar') { initCalUserFilter(); loadCalendar(); }
        if (view === 'report') loadReport();
        if (view === 'settings') loadSettings();
        if (view === 'methodology') loadMethodology();
    }

    // ─── Overview ──────────────────────────────────────────────
    async function loadOverview() {
        const [stats, weekly, overdue] = await Promise.all([
            api('/api/stats'),
            api('/api/weekly-stats'),
            api('/api/overdue')
        ]);

        // Stat cards
        document.getElementById('overview-cards').innerHTML = `
            <div class="stat-card">
                <div class="label">今日总任务</div>
                <div class="value">${stats.total_tasks}</div>
                <div class="sub">${stats.date}</div>
            </div>
            <div class="stat-card">
                <div class="label">已完成</div>
                <div class="value" style="color:var(--success)">${stats.completed_tasks}</div>
                <div class="sub">完成率 ${stats.completion_rate}%</div>
            </div>
            <div class="stat-card">
                <div class="label">进行中</div>
                <div class="value" style="color:var(--warning)">${stats.user_stats.reduce((s,u)=>s+u.in_progress, 0)}</div>
            </div>
            <div class="stat-card">
                <div class="label">待办</div>
                <div class="value" style="color:var(--text-secondary)">${stats.user_stats.reduce((s,u)=>s+u.todo, 0)}</div>
            </div>
            ${overdue.length > 0 ? `
            <div class="stat-card" style="border-color:#FECACA;background:#FFF5F5;cursor:pointer" onclick="switchView('report');document.querySelectorAll('.header-nav button')[2].click()">
                <div class="label" style="color:var(--danger)">逾期任务</div>
                <div class="value" style="color:var(--danger)">${overdue.length}</div>
                <div class="sub" style="color:var(--danger)">点击查看详情</div>
            </div>` : ''}
        `;

        // Team grid
        const grid = document.getElementById('team-grid');
        grid.innerHTML = '';
        const statusIcon = {done:'✅', in_progress:'🔵', todo:'⚪'};
        const priorityColors = {urgent:'var(--urgent)', high:'var(--high)', medium:'var(--warning)', low:'var(--low)'};
        stats.user_stats.forEach(u => {
            const pct = u.total > 0 ? Math.round(u.done / u.total * 100) : 0;
            const color = pct >= 80 ? 'var(--success)' : pct >= 40 ? 'var(--warning)' : '#d1d5db';
            const taskRows = (u.tasks || []).map(t => {
                const reviewBadge = t.review_status === 'approved' ? '<span class="review-badge review-approved" style="font-size:10px;padding:1px 5px">✓通过</span>' : t.review_status === 'needs_revision' ? '<span class="review-badge review-needs_revision" style="font-size:10px;padding:1px 5px">✗修改</span>' : '';
                return `<div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;border-top:1px solid #f3f4f6">
                    <span>${statusIcon[t.status]||'⚪'}</span>
                    <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${t.status==='done'?'text-decoration:line-through;color:#aaa':''}">${escHtml(t.title)}</span>
                    ${reviewBadge}
                    <span style="font-size:11px;font-weight:600;color:${t.progress>=80?'var(--success)':t.progress>=40?'var(--warning)':'#ccc'}">${t.progress}%</span>
                </div>`;
            }).join('');
            grid.innerHTML += `
                <div class="team-card" onclick="viewUserTasks(${u.user_id})" style="padding-bottom:8px">
                    <div class="team-card-header">
                        <div class="avatar" style="background:${u.avatar_color}">${u.display_name[0]}</div>
                        <div>
                            <div class="name">${u.display_name}</div>
                            <div class="role">${u.total} 项任务 · 平均进度 ${u.avg_progress}%</div>
                        </div>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width:${pct}%;background:${color}"></div>
                    </div>
                    <div class="team-card-stats" style="margin-bottom:8px">
                        <span><span class="dot dot-done"></span>${u.done} 完成</span>
                        <span><span class="dot dot-progress"></span>${u.in_progress} 进行中</span>
                        <span><span class="dot dot-todo"></span>${u.todo} 待办</span>
                    </div>
                    ${taskRows || '<div style="font-size:12px;color:#ccc;text-align:center;padding:4px 0;border-top:1px solid #f3f4f6">暂无任务</div>'}
                </div>
            `;
        });

        // Weekly chart
        const chart = document.getElementById('weekly-chart');
        const today = new Date().toISOString().split('T')[0];
        const maxTasks = Math.max(...weekly.map(d => d.total), 1);
        chart.innerHTML = '';
        weekly.forEach(d => {
            const totalH = Math.max((d.total / maxTasks) * 70, 2);
            const doneH = d.total > 0 ? (d.done / d.total) * totalH : 0;
            const isToday = d.date === today;
            chart.innerHTML += `
                <div class="weekly-bar">
                    <div class="day-count">${d.done}/${d.total}</div>
                    <div class="bar-container">
                        <div class="bar bar-total" style="height:${totalH}px;position:relative">
                            <div class="bar bar-done" style="height:${doneH}px;${isToday?'background:#7C3AED':''}"></div>
                        </div>
                    </div>
                    <div class="day-label ${isToday ? 'today-marker' : ''}">${d.weekday}</div>
                </div>
            `;
        });
    }

    function viewUserTasks(userId) {
        document.getElementById('filter-user').value = userId;
        // Switch to tasks view
        document.querySelectorAll('.header-nav button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.header-nav button')[1].classList.add('active');
        document.getElementById('view-overview').style.display = 'none';
        document.getElementById('view-tasks').style.display = '';
        document.getElementById('view-settings').style.display = 'none';
        currentView = 'tasks';
        loadTasks();
    }

    // ─── Tasks ─────────────────────────────────────────────────
    async function loadTasks() {
        const userId = document.getElementById('filter-user').value;
        let url = `/api/tasks?date=${currentDate}`;
        if (userId) url += `&user_id=${userId}`;
        if (currentUser.role === 'admin' && !userId) url += '&all=1';

        let tasks = await api(url);

        // Apply status filter
        if (statusFilter) {
            tasks = tasks.filter(t => t.status === statusFilter);
        }

        const list = document.getElementById('task-list');
        if (tasks.length === 0) {
            list.innerHTML = '<div class="task-empty">暂无任务</div>';
            return;
        }

        const priorityLabels = {urgent:'紧急', high:'高', medium:'中', low:'低'};
        const statusLabels = {todo:'待办', in_progress:'进行中', done:'已完成'};

        const todayStr = new Date().toISOString().split('T')[0];
        list.innerHTML = tasks.map(t => {
            const pColor = t.progress >= 80 ? 'var(--success)' : t.progress >= 40 ? 'var(--warning)' : 'var(--primary)';
            const isOverdue = t.due_date && t.due_date < todayStr && t.status !== 'done';
            return `
            <div class="task-item ${isOverdue ? 'overdue' : ''}" ondblclick="showEditTask(${t.id})">
                <div class="task-checkbox ${t.status}" onclick="event.stopPropagation();toggleTaskStatus(${t.id},'${t.status}')"></div>
                <div class="task-body">
                    <div class="task-title ${t.status === 'done' ? 'done-text' : ''}">${escHtml(t.title)}</div>
                    <div class="task-meta">
                        <span class="priority-tag priority-${t.priority}">${priorityLabels[t.priority]}</span>
                        ${t.category ? `<span style="background:#f3f4f6;padding:1px 8px;border-radius:4px">${escHtml(t.category)}</span>` : ''}
                        ${t.description ? `<span title="${escHtml(t.description)}">📝</span>` : ''}
                        ${t.attach_count > 0 ? `<span class="task-attach-count">📎${t.attach_count}</span>` : ''}
                        ${t.comment_count > 0 ? `<span class="task-attach-count">💬${t.comment_count}</span>` : ''}
                        ${t.review_status === 'approved' ? '<span class="review-badge review-approved">&#10003; 通过</span>' : ''}
                        ${t.review_status === 'needs_revision' ? '<span class="review-badge review-needs_revision">&#10007; 需修改</span>' : ''}
                        ${t.accepted_at ? '<span class="accepted-badge">已接受</span>' : (t.assigned_to !== (currentUser||{}).id ? '<span class="pending-badge">待接受</span>' : '')}
                        ${(() => {
                            if (!t.due_date || isOverdue) return t.due_date ? '<span><span class="overdue-badge">已逾期</span> '+t.due_date+'</span>' : '';
                            const daysLeft = Math.ceil((new Date(t.due_date+'T00:00:00') - new Date(todayStr+'T00:00:00')) / 86400000);
                            if (daysLeft <= 1 && t.status !== 'done') return '<span class="deadline-soon">明天截止</span> '+t.due_date;
                            if (daysLeft <= 3 && t.status !== 'done') return '<span class="deadline-soon">'+daysLeft+'天后截止</span> '+t.due_date;
                            return '⏰ '+t.due_date;
                        })()}
                    </div>
                </div>
                <div class="task-progress">
                    <div class="task-progress-bar">
                        <div class="task-progress-fill" style="width:${t.progress}%;background:${pColor}"></div>
                    </div>
                    <span class="task-progress-text">${t.progress}%</span>
                </div>
                ${!t.accepted_at && t.assigned_to === (currentUser||{}).id && currentUser.role !== 'admin' ? `<button class="accept-btn" onclick="event.stopPropagation();acceptTask(${t.id})">接受</button>` : ''}
                <div class="task-assigned">
                    <div class="avatar" style="background:${t.avatar_color}" title="${t.assigned_name}">${t.assigned_name[0]}</div>
                </div>
                <div class="task-actions">
                    <button onclick="event.stopPropagation();showEditTask(${t.id})" title="编辑">✏️</button>
                    ${currentUser.role === 'admin' ? `<button onclick="event.stopPropagation();deleteTask(${t.id})" title="删除">🗑</button>` : ''}
                </div>
            </div>
            `;
        }).join('');
    }

    async function toggleTaskStatus(id, current) {
        const next = current === 'todo' ? 'in_progress' : current === 'in_progress' ? 'done' : 'todo';
        const progress = next === 'done' ? 100 : next === 'in_progress' ? 50 : 0;
        await api(`/api/tasks/${id}`, {method:'PUT', body:{status:next, progress}});
        loadTasks();
        if (currentView === 'overview') loadOverview();
        toast(next === 'done' ? '任务已完成!' : `状态已更新`);
    }

    function filterStatus(btn) {
        document.querySelectorAll('#status-filter .filter-chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        statusFilter = btn.dataset.status;
        loadTasks();
    }

    // ─── Task Modal ────────────────────────────────────────────
    function showAddTask() {
        document.getElementById('modal-title').textContent = '新建任务';
        document.getElementById('task-id').value = '';
        document.getElementById('task-title').value = '';
        document.getElementById('task-desc').value = '';
        document.getElementById('task-priority').value = 'medium';
        document.getElementById('task-date').value = currentDate;
        document.getElementById('task-due').value = '';
        document.getElementById('task-category').value = '';
        document.getElementById('task-progress').value = 0;
        document.getElementById('progress-display').textContent = '0%';
        document.getElementById('progress-group').style.display = 'none';
        document.getElementById('status-group').style.display = 'none';
        document.getElementById('attach-group').style.display = 'none';
        document.getElementById('attach-list').innerHTML = '';
        document.getElementById('review-group').style.display = 'none';
        document.getElementById('comment-group').style.display = 'none';
        document.getElementById('comment-list').innerHTML = '';
        document.getElementById('subtask-group').style.display = 'none';
        document.getElementById('subtask-list').innerHTML = '';
        document.getElementById('activity-group').style.display = 'none';
        document.getElementById('task-recurrence').value = '';
        document.getElementById('tags-group').style.display = 'none';
        document.getElementById('time-group').style.display = 'none';

        // Default assign to selected user or self
        const filterUser = document.getElementById('filter-user').value;
        document.getElementById('task-assigned').value = filterUser || currentUser.id;

        // Only admin can see assign dropdown
        document.getElementById('task-assigned').disabled = currentUser.role !== 'admin';

        document.getElementById('task-modal').classList.add('show');
        document.getElementById('task-title').focus();
    }

    async function showEditTask(id) {
        const tasks = await api(`/api/tasks?date=${currentDate}`);
        const t = tasks.find(t => t.id === id);
        if (!t) return;

        document.getElementById('modal-title').textContent = '编辑任务';
        document.getElementById('task-id').value = t.id;
        document.getElementById('task-title').value = t.title;
        document.getElementById('task-desc').value = t.description || '';
        document.getElementById('task-assigned').value = t.assigned_to;
        document.getElementById('task-priority').value = t.priority;
        document.getElementById('task-date').value = t.task_date;
        document.getElementById('task-due').value = t.due_date || '';
        document.getElementById('task-category').value = t.category || '';
        document.getElementById('task-progress').value = t.progress;
        document.getElementById('progress-display').textContent = t.progress + '%';

            list.innerHTML = attachments.map(a => {

                return `

    async function uploadFiles(files) {
        const taskId = document.getElementById('task-id').value;
        if (!taskId) { toast('请先保存任务再上传附件'); return; }
        const formData = new FormData();
        for (const f of files) {
            formData.append('file', f);
        }
        try {
            const res = await fetch(BASE + `/api/tasks/${taskId}/attachments`, {
                method: 'POST', body: formData
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            toast(`已上传 ${data.uploaded.length} 个文件`);
            loadAttachments(taskId);
            loadTasks(); // refresh attachment counts
        } catch(e) { toast(e.message); }
        document.getElementById('file-input').value = '';
    }

        const zone = document.getElementById('attach-zone');
        if (!zone) return;
        zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));

    function setExportRange(range) {
        const today = new Date();
        let start, end;
        if (range === 'today') {
            start = end = today;
        } else if (range === 'week') {
            start = new Date(today); start.setDate(today.getDate() - today.getDay() + 1);
            end = new Date(start); end.setDate(start.getDate() + 6);
        } else if (range === 'month') {
            start = new Date(today.getFullYear(), today.getMonth(), 1);
            end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
        } else if (range === 'last-month') {
            start = new Date(today.getFullYear(), today.getMonth() - 1, 1);
            end = new Date(today.getFullYear(), today.getMonth(), 0);
        }
        document.getElementById('export-start').value = start.toISOString().split('T')[0];
        document.getElementById('export-end').value = end.toISOString().split('T')[0];
    }

    function doExport() {
        const start = document.getElementById('export-start').value;

    // ─── Calendar ────────────────────────────────────────────────
    let calYear = new Date().getFullYear();
    let calMonth = new Date().getMonth() + 1;

    function initCalUserFilter() {
        const sel = document.getElementById('cal-user-filter');
        sel.innerHTML = '<option value="">全部成员</option>';
        users.forEach(u => { sel.innerHTML += `<option value="${u.id}">${u.display_name}</option>`; });

    function changeCalMonth(delta) {
        calMonth += delta;
        if (calMonth > 12) { calMonth = 1; calYear++; }
        if (calMonth < 1) { calMonth = 12; calYear--; }
        loadCalendar();
    }

    async function loadCalendar() {
        document.getElementById('cal-month-label').textContent = `${calYear}年${calMonth}月`;
        const firstDay = new Date(calYear, calMonth - 1, 1);
        const lastDay = new Date(calYear, calMonth, 0);
        const startPad = (firstDay.getDay() + 6) % 7;
        const calStart = new Date(firstDay); calStart.setDate(1 - startPad);
        const calEnd = new Date(lastDay); calEnd.setDate(lastDay.getDate() + (6 - (lastDay.getDay() + 6) % 7));

        const userId = document.getElementById('cal-user-filter').value;
        let url = BASE + `/api/calendar?start=${calStart.toISOString().split('T')[0]}&end=${calEnd.toISOString().split('T')[0]}`;
        if (userId) url += `&user_id=${userId}`;

        const tasks = await api(url.replace(BASE + BASE, BASE));
        const taskMap = {};
        tasks.forEach(t => {
            if (!taskMap[t.task_date]) taskMap[t.task_date] = [];
            taskMap[t.task_date].push(t);
        });

        const todayStr = new Date().toISOString().split('T')[0];
        let html = '<div class="cal-grid"><div class="cal-header">周一</div><div class="cal-header">周二</div><div class="cal-header">周三</div><div class="cal-header">周四</div><div class="cal-header">周五</div><div class="cal-header">周六</div><div class="cal-header">周日</div>';

        let current = new Date(calStart);
        while (current <= calEnd) {
            const ds = current.toISOString().split('T')[0];
            const isOther = current.getMonth() + 1 !== calMonth;
            const isToday = ds === todayStr;
            const dayTasks = taskMap[ds] || [];
            html += `<div class="cal-day ${isOther?'other-month':''} ${isToday?'today':''}" onclick="setDate('${ds}');switchView('tasks');document.querySelectorAll('.header-nav button')[1].click()">
                <div class="day-num">${current.getDate()}</div>
                ${dayTasks.slice(0,3).map(t => `<div class="cal-task ${t.status==='done'?'done':t.priority}">${escHtml(t.title)}</div>`).join('')}
                ${dayTasks.length > 3 ? `<div style="font-size:10px;color:var(--text-secondary)">+${dayTasks.length-3}更多</div>` : ''}
            </div>`;
            current.setDate(current.getDate() + 1);
        }
        html += '</div>';
        document.getElementById('cal-days').innerHTML = html;

        // Load workload
        loadWorkload();
    }

    async function loadWorkload() {
        try {
            const data = await api('/api/workload');
            const list = document.getElementById('workload-list');
            list.innerHTML = data.map(u => {
                const maxTasks = 10;
                const pct = Math.min(Math.round(u.pending / maxTasks * 100), 100);
                return `<div class="workload-card">
                    <div class="avatar" style="background:${u.avatar_color}">${u.display_name[0]}</div>
                    <div style="font-weight:600;min-width:60px">${u.display_name}</div>
                    <div class="workload-bar">
                        <div class="workload-fill ${u.load_level}" style="width:${Math.max(pct,5)}%">${u.pending}项</div>
                    </div>
                    <div class="workload-meta">
                        <span>总${u.total_tasks}</span>
                        <span style="color:var(--success)">完成${u.done}</span>
                        <span style="color:var(--danger)">紧急${u.urgent_count}</span>
                        <span>${u.hours_logged}h</span>
                    </div>
                </div>`;
            }).join('');
        } catch(e) {}
    }

    // ─── Tags ────────────────────────────────────────────────────
    let allTags = [];
    let selectedTagIds = [];

    async function loadTaskTags(taskId) {
        try {
            allTags = await api('/api/tags');
            const taskTags = await api('/api/tasks/' + taskId + '/tags');
            selectedTagIds = taskTags.map(t => t.id);
            renderTagSelect();
        } catch(e) {}
    }

    function renderTagSelect() {
        const el = document.getElementById('tag-select');
        el.innerHTML = allTags.map(t => {
            const sel = selectedTagIds.includes(t.id);
            return `<span class="tag-option ${sel?'selected':''}" style="background:${t.color}20;color:${t.color}"
                         onclick="toggleTag(${t.id})">${t.name}</span>`;
        }).join('');
    }

    function toggleTag(tagId) {
        const idx = selectedTagIds.indexOf(tagId);
        if (idx >= 0) selectedTagIds.splice(idx, 1);
        else selectedTagIds.push(tagId);
        renderTagSelect();
        const taskId = document.getElementById('task-id').value;
        if (taskId) api('/api/tasks/' + taskId + '/tags', {method:'POST', body:{tag_ids: selectedTagIds}});
    }

    async function createTag() {
        const name = document.getElementById('new-tag-name').value.trim();
        const color = document.getElementById('new-tag-color').value;
        if (!name) return;
        await api('/api/tags', {method:'POST', body:{name, color}});
        document.getElementById('new-tag-name').value = '';
        const taskId = document.getElementById('task-id').value;
        if (taskId) loadTaskTags(taskId);
    }

    // ─── Time Tracking ──────────────────────────────────────────
    async function loadTimeEntries(taskId) {
        try {
            const data = await api('/api/tasks/' + taskId + '/time');
            const el = document.getElementById('time-entries');
            const totalH = (data.total_minutes / 60).toFixed(1);
            let html = `<div style="margin-bottom:8px">总计: <span class="time-total">${totalH}h</span> (${data.total_minutes}分钟)</div>`;
            html += data.entries.map(e => `
                <div class="time-entry-row">
                    <span style="font-weight:600">${e.display_name}</span>
                    <span>${e.duration}分钟</span>
                    <span style="color:var(--text-secondary)">${e.entry_date}</span>
                    <span style="color:var(--text-secondary)">${escHtml(e.note||'')}</span>
                    <button class="subtask-del" onclick="deleteTimeEntry(${e.id})">×</button>
                </div>
            `).join('');
            el.innerHTML = html;
        } catch(e) {}
    }

    async function addTimeEntry() {
        const taskId = document.getElementById('task-id').value;
        const duration = parseInt(document.getElementById('time-duration').value);
        const note = document.getElementById('time-note').value.trim();
        if (!taskId || !duration || duration < 1) { toast('请输入有效时长'); return; }
        await api('/api/tasks/' + taskId + '/time', {method:'POST', body:{duration, note}});
        document.getElementById('time-duration').value = '';
        document.getElementById('time-note').value = '';
        loadTimeEntries(taskId);
        toast('工时已记录');
    }

    async function deleteTimeEntry(entryId) {
        await api('/api/time-entries/' + entryId, {method:'DELETE'});
        const taskId = document.getElementById('task-id').value;
        loadTimeEntries(taskId);
    }

    // ─── Subtasks ────────────────────────────────────────────────
    async function loadSubtasks(taskId) {
        const list = document.getElementById('subtask-list');
        try {
            const subs = await api('/api/tasks/' + taskId + '/subtasks');
            if (subs.length === 0) {
                list.innerHTML = '<div style="font-size:12px;color:#ccc;padding:4px 0">暂无子任务</div>';
                return;
            }
            list.innerHTML = subs.map(s => `
                <div class="subtask-item">
                    <div class="subtask-check ${s.status === 'done' ? 'done' : ''}"
                         onclick="toggleSubtask(${s.id}, '${s.status}')">${s.status === 'done' ? '✓' : ''}</div>
                    <span class="subtask-title ${s.status === 'done' ? 'done' : ''}">${escHtml(s.title)}</span>
                    ${s.assigned_name ? '<span style="font-size:11px;color:var(--text-secondary)">'+escHtml(s.assigned_name)+'</span>' : ''}
                    <button class="subtask-del" onclick="deleteSubtask(${s.id})">×</button>
                </div>
            `).join('');
        } catch(e) { list.innerHTML = ''; }
    }

    async function addSubtask() {
        const taskId = document.getElementById('task-id').value;
        const input = document.getElementById('new-subtask');
        const title = input.value.trim();
        if (!taskId || !title) return;
        await api('/api/tasks/' + taskId + '/subtasks', {method:'POST', body:{title}});
        input.value = '';
        loadSubtasks(taskId);
    }

    async function toggleSubtask(subId, current) {
        const next = current === 'done' ? 'todo' : 'done';
        await api('/api/subtasks/' + subId, {method:'PUT', body:{status: next}});
        const taskId = document.getElementById('task-id').value;
        loadSubtasks(taskId);
        loadTasks();
    }

    async function deleteSubtask(subId) {
        await api('/api/subtasks/' + subId, {method:'DELETE'});
        const taskId = document.getElementById('task-id').value;
        loadSubtasks(taskId);
    }

    // ─── Activity Log ───────────────────────────────────────────
    async function loadActivity(taskId) {
        const list = document.getElementById('activity-list');
        try {
            const logs = await api('/api/tasks/' + taskId + '/activity');
            if (logs.length === 0) {
                list.innerHTML = '<div style="font-size:12px;color:#ccc;padding:4px 0">暂无记录</div>';
                return;
            }
            list.innerHTML = logs.map(l => {
                const time = l.created_at ? l.created_at.replace('T',' ').substring(5,16) : '';
                return `<div class="activity-item">
                    <div class="act-dot"></div>
                    <div><span class="act-user">${escHtml(l.display_name)}</span> ${escHtml(l.action)}${l.detail ? ' · '+escHtml(l.detail) : ''} <span class="act-time">${time}</span></div>
                </div>`;
            }).join('');
        } catch(e) { list.innerHTML = ''; }
    }

    // ─── Notifications ──────────────────────────────────────────
    async function loadNotifications() {
        try {
            const data = await api('/api/notifications');
            const badge = document.getElementById('notif-badge');
            if (data.unread > 0) {
                badge.textContent = data.unread;
                badge.style.display = '';
            } else {
                badge.style.display = 'none';
            }
            const list = document.getElementById('notif-list');
            if (data.notifications.length === 0) {
                list.innerHTML = '<div class="notif-empty">暂无通知</div>';
                return;
            }
            list.innerHTML = data.notifications.map(n => {
                const time = n.created_at ? n.created_at.replace('T',' ').substring(5,16) : '';
                return `<div class="notif-item ${n.is_read ? '' : 'unread'}">
                    <div class="title">${escHtml(n.title)}</div>
                    <div>${escHtml(n.content)}</div>
                    <div class="time">${time}</div>
                </div>`;
            }).join('');
        } catch(e) {}
    }

    function toggleNotifications() {
        const dd = document.getElementById('notif-dropdown');
        dd.classList.toggle('show');
        if (dd.classList.contains('show')) loadNotifications();
    }

    async function markAllRead() {

    async function submitAgreement() {
        const title = document.getElementById('agr-title').value.trim();
        if (!title) { showToast('请填写任务目标', 'warning'); return; }

        const standard = document.getElementById('agr-standard').value.trim();
        const understanding = document.getElementById('agr-understanding').value.trim();
        const commitment = document.getElementById('agr-commitment').value.trim();
        const support = document.getElementById('agr-support').value.trim();
        const s = document.getElementById('agr-s').value.trim();
        const i = document.getElementById('agr-i').value.trim();
        const p = document.getElementById('agr-p').value.trim();
        const o = document.getElementById('agr-o').value.trim();
        const c = document.getElementById('agr-c').value.trim();

        // 组装结构化描述
        let desc = '【一分钟目标协议书】\n\n';
        desc += '━━ 目标匹配 ━━\n';
        if (standard) desc += '经理-验收标准：' + standard + '\n';
        if (understanding) desc += '员工-我的理解：' + understanding + '\n';
        if (commitment) desc += '员工-完成承诺：' + commitment + '\n';
        if (support) desc += '员工-需要支持：' + support + '\n';

        // 主流程步骤
        const mainRows = document.querySelectorAll('#soc-main-body tr');
        if (mainRows.length) {
            desc += '\n━━ 主流程 ━━\n';
            mainRows.forEach((r, idx) => {
                const name = (r.querySelector('[data-mgr="step-name"]') || {}).value || '';
                const detail = (r.querySelector('[data-mgr="step-detail"]') || {}).value || '';
                const plan = (r.querySelector('[data-emp="step-plan"]') || {}).value || '';
                const dt = (r.querySelector('[data-emp="step-date"]') || {}).value || '';
                if (!name.trim()) return;
                desc += (idx+1) + '. ' + name.trim();
                if (dt) desc += ' [' + dt + ']';
                desc += '\n';
                if (detail.trim()) desc += '   标准：' + detail.trim() + '\n';
                if (plan.trim()) desc += '   计划：' + plan.trim() + '\n';
            });
        }

        // 岗前准备
        const prepRows = document.querySelectorAll('#soc-prep-body tr');
        const prepItems = [];
        prepRows.forEach(r => {
            const mgr = r.querySelector('[data-mgr="prep"]');
            const emp = r.querySelector('[data-emp="prep"]');
            const label = r.querySelector('td').textContent.trim();
            if ((mgr && mgr.value.trim()) || (emp && emp.value.trim())) {
                prepItems.push(label + '：' + (mgr ? mgr.value.trim() : '') + (emp && emp.value.trim() ? ' → 员工：' + emp.value.trim() : ''));
            }
        });
        if (prepItems.length) {
            desc += '\n━━ 岗前准备 ━━\n' + prepItems.join('\n') + '\n';
        }

        if (s || i || p || o || c) {
            desc += '\n━━ 流程索引(SIPOC) ━━\n';
            if (s) desc += 'S(供应商)：' + s + '\n';
            if (i) desc += 'I(输入)：' + i + '\n';
            if (p) desc += 'P(过程)：' + p + '\n';
            if (o) desc += 'O(输出)：' + o + '\n';
            if (c) desc += 'C(客户)：' + c + '\n';
        }

        const assignee = document.getElementById('agr-assignee').value;
        const deadline = document.getElementById('agr-deadline').value;
        const priority = document.getElementById('agr-priority').value;

        const res = await api('/api/tasks', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                title: title,
                description: desc.trim(),
                assigned_to: parseInt(assignee),
                priority: priority,
                due_date: deadline,
                task_date: new Date().toISOString().split('T')[0],
                category: '一分钟目标'
            })
        });

        if (res.ok) {
            showToast('协议已签署，任务已创建！');
            // 清空表单
            ['agr-title','agr-standard','agr-understanding','agr-commitment','agr-support','agr-s','agr-i','agr-p','agr-o','agr-c'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            document.getElementById('agr-confirmed').checked = false;
            document.getElementById('agr-submit-btn').disabled = true;
            // 重新渲染整个表单
            renderAgreementForm();
            loadAgreementList();
        } else {
            showToast(res.error || '创建失败', 'error');
        }
    }

    let socInited = false;

    let socMainCount = 0;
    function addSOCMainStep() {
        socMainCount++;
        const tbody = document.getElementById('soc-main-body');
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="num-cell">${socMainCount}</td><td><input placeholder="步骤名称" data-cat="main" data-field="name"></td><td><textarea rows="2" placeholder="详细操作细节和标准..." data-cat="main" data-field="detail"></textarea></td><td><button class="soc-del" onclick="removeSOCRow(this,'soc-main-body')">×</button></td>`;
        tbody.appendChild(tr);
    }

    function addSOCRow(tbodyId, cat) {
        const tbody = document.getElementById(tbodyId);
        const tr = document.createElement('tr');
        if (cat === 'prep') {
            tr.innerHTML = `<td><input placeholder="准备项" data-cat="prep" data-field="name"></td><td><textarea rows="1" placeholder="操作细节和标准" data-cat="prep" data-field="detail"></textarea></td>`;
        } else {
            tr.innerHTML = `<td><input placeholder="异常情况" data-cat="exception" data-field="name"></td><td><textarea rows="1" placeholder="处理方法" data-cat="exception" data-field="detail"></textarea></td><td><button class="soc-del" onclick="removeSOCRow(this,'${tbodyId}')">×</button></td>`;
        }
        tbody.appendChild(tr);
    }

    function removeSOCRow(btn, tbodyId) {
        btn.closest('tr').remove();
        if (tbodyId === 'soc-main-body') {
            const rows = document.querySelectorAll('#soc-main-body tr');
            rows.forEach((r, i) => { const c = r.querySelector('.num-cell'); if (c) c.textContent = i + 1; });
            socMainCount = rows.length;
        }
    }

    function collectProcessSteps() {
        if (!socInited) return [];
        const sections = [];
        // 岗前准备
        const preps = [];
        document.querySelectorAll('#soc-prep-body tr').forEach(r => {
            const n = r.querySelector('[data-field="name"]'); const d = r.querySelector('[data-field="detail"]');
            if (n && n.value.trim()) preps.push({name: n.value.trim(), detail: (d && d.value.trim()) || ''});
        });
        if (preps.length) sections.push({title: '岗前准备', items: preps});
        // 主流程
        const mains = [];
        document.querySelectorAll('#soc-main-body tr').forEach((r, i) => {
            const n = r.querySelector('[data-field="name"]'); const d = r.querySelector('[data-field="detail"]');
            if (n && n.value.trim()) mains.push({step: i+1, name: n.value.trim(), detail: (d && d.value.trim()) || ''});
        });
        if (mains.length) sections.push({title: '主流程', items: mains});
        // 异常处理
        const excs = [];
        document.querySelectorAll('#soc-exception-body tr').forEach(r => {
            const n = r.querySelector('[data-field="name"]'); const d = r.querySelector('[data-field="detail"]');
            if (n && n.value.trim()) excs.push({name: n.value.trim(), detail: (d && d.value.trim()) || ''});
        });
        if (excs.length) sections.push({title: '异常处理', items: excs});
        return sections;
    }

    function priorityLabel(p) {
        const m = {urgent:'紧急',high:'高',medium:'中',low:'低'};
        return m[p] || p;
    }

    async function loadAgreementList() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('agreement-date').textContent = today;
        const tasks = await api('/api/tasks?date=' + today);
        // 筛选出通过协议书创建的任务
        const agreements = (tasks || []).filter(t => t.category === '一分钟目标' || (t.description && t.description.includes('一分钟目标协议书')));

        if (!agreements.length) {
            document.getElementById('agreement-list').innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:20px;font-size:13px">今日暂无协议，在上方签署第一份吧</div>';
            return;
        }

        document.getElementById('agreement-list').innerHTML = agreements.map(t => {
            const assignee = users.find(u => u.id === t.assigned_to);
            const creator = users.find(u => u.id === t.created_by);
            const isAccepted = t.accepted_at;
            const statusClass = isAccepted ? 'accepted' : 'pending';
            const statusText = isAccepted ? '已确认接受' : '待员工确认';

            // 解析描述中的字段
            const desc = t.description || '';
            const getField = (label) => {
                const m = desc.match(new RegExp(label + '：(.+)'));
                return m ? m[1].trim() : '';
            };

            return `<div class="agreement-card">
                <div class="ac-col">
                    <strong>📋 发布方</strong>：${creator ? creator.display_name : ''}
                    <div style="margin-top:6px">
                        <div>🎯 <strong>${t.title}</strong></div>
                        ${getField('验收标准') ? '<div style="color:var(--text-secondary)">验收：' + getField('验收标准') + '</div>' : ''}
                    </div>
                </div>
                <div class="ac-col">
                    <strong>📋 执行方</strong>：${assignee ? assignee.display_name : ''}
                    <div style="margin-top:6px">
                        ${getField('我的理解') ? '<div>理解：' + getField('我的理解') + '</div>' : ''}
                        ${getField('完成承诺') ? '<div>承诺：' + getField('完成承诺') + '</div>' : ''}
                    </div>
                </div>
                <div class="ac-meta">
                    <span>截止：${t.due_date || '未设置'} · 优先级：${priorityLabel(t.priority)}</span>
                    <span class="ac-status ${statusClass}">${statusText}</span>
                </div>
            </div>`;
        }).join('');
    }

                            <span>是否有明确的截止时间？</span>
                        </li>
                        <li onclick="this.classList.toggle('checked')">
                            <span class="check"></span>
                            <span>一分钟内能读完吗？（不超过250字）</span>
                        </li>
                        <li onclick="this.classList.toggle('checked')">
                            <span class="check"></span>
                            <span>对方看完能知道该怎么行动吗？</span>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="method-section" style="border-top:1px solid #d4ccc0">
                <div class="method-section-title">📊 练习：SIPOC 快速分析</div>
                <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">
                    选一个你正在做的任务，用 SIPOC 五要素拆解一下，理清上下游关系。
                </p>
                <div class="method-sipoc-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
                    <div>
                        <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;color:#1E40AF">S 供应商</label>
                        <textarea placeholder="谁提供输入？" style="width:100%;min-height:60px;padding:8px;border:1px solid #b0a898;border-radius:5px;font-size:12px;font-family:inherit;resize:vertical;background:linear-gradient(180deg,#f0ebe2 0%,#faf6ef 4px,#faf6ef 100%)"></textarea>
                    </div>
                    <div>
                        <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;color:#1E40AF">I 输入</label>
                        <textarea placeholder="需要什么？" style="width:100%;min-height:60px;padding:8px;border:1px solid #b0a898;border-radius:5px;font-size:12px;font-family:inherit;resize:vertical;background:linear-gradient(180deg,#f0ebe2 0%,#faf6ef 4px,#faf6ef 100%)"></textarea>
                    </div>
                    <div>
                        <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;color:#1E40AF">P 过程</label>
                        <textarea placeholder="关键步骤？" style="width:100%;min-height:60px;padding:8px;border:1px solid #b0a898;border-radius:5px;font-size:12px;font-family:inherit;resize:vertical;background:linear-gradient(180deg,#f0ebe2 0%,#faf6ef 4px,#faf6ef 100%)"></textarea>
                    </div>
                    <div>
                        <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;color:#1E40AF">O 输出</label>
                        <textarea placeholder="交付什么？" style="width:100%;min-height:60px;padding:8px;border:1px solid #b0a898;border-radius:5px;font-size:12px;font-family:inherit;resize:vertical;background:linear-gradient(180deg,#f0ebe2 0%,#faf6ef 4px,#faf6ef 100%)"></textarea>
                    </div>
                    <div>
                        <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;color:#1E40AF">C 客户</label>
                        <textarea placeholder="谁接收？" style="width:100%;min-height:60px;padding:8px;border:1px solid #b0a898;border-radius:5px;font-size:12px;font-family:inherit;resize:vertical;background:linear-gradient(180deg,#f0ebe2 0%,#faf6ef 4px,#faf6ef 100%)"></textarea>
                    </div>
                </div>
            </div>

            <div class="method-section" style="border-top:1px solid #d4ccc0">
                <div class="method-section-title">🔧 自检：你是在报时还是造钟？</div>
                <ul class="method-checklist">
                    <li onclick="this.classList.toggle('checked')">
                        <span class="check"></span>
                        <span>团队中反复出现的问题，我已经写成了 SOP 或模板</span>
                    </li>
                    <li onclick="this.classList.toggle('checked')">
                        <span class="check"></span>
                        <span>新人入职后，能通过文档自主完成80%的常规任务</span>
                    </li>
                    <li onclick="this.classList.toggle('checked')">
                        <span class="check"></span>
                        <span>我不在的时候，团队仍然能正常推进工作</span>
                    </li>
                    <li onclick="this.classList.toggle('checked')">
                        <span class="check"></span>
                        <span>我的时间主要花在「设计系统」而非「救火」上</span>
                    </li>
                    <li onclick="this.classList.toggle('checked')">
                        <span class="check"></span>
                        <span>每个重要流程都有文档化的检查清单</span>
                    </li>
                </ul>
            </div>
        `;
    }

    function toggleMethodCard(el) {
        if (event.target.closest('.method-card-body')) return;
        el.classList.toggle('open');
    }

    function updateMethodWordCount() {
        const text = document.getElementById('method-practice-goal').value;
        const count = text.replace(/\s/g, '').length;
        const el = document.getElementById('method-word-count');
        el.textContent = count + ' 字（建议不超过 250 字）';
        el.className = 'method-word-count' + (count > 250 ? ' over' : '');
    }

    // ─── Start ─────────────────────────────────────────────────
    init();
    </script>
</body>
</html>
